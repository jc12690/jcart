<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarred Carter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0e0e0e;
            --surface: #1a1a1a;
            --border: rgba(255,255,255,0.08);
            --text: #f0ece4;
            --muted: rgba(240,236,228,0.5);
            --accent: #d4a96a;
            --accent2: #e8c99a;
        }

        html, body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ── HERO ── */
        .hero {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            overflow: hidden;
        }

        .hero-img-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 3/4;
        }

        .hero-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* gradient fade from photo into page bg */
        .hero-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                    to bottom,
                    transparent 40%,
                    rgba(14,14,14,0.55) 65%,
                    var(--bg) 100%
            );
            pointer-events: none;
        }

        /* name + title overlay at bottom of hero */
        .hero-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            padding: 0 28px 32px;
            text-align: center;
        }

        .hero-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.8rem, 10vw, 3.8rem);
            letter-spacing: 0.06em;
            line-height: 1;
            color: var(--text);
            text-shadow: 0 2px 24px rgba(0,0,0,0.6);
        }

        .hero-title {
            margin-top: 6px;
            font-size: 0.78rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent2);
            opacity: 0.9;
        }

        /* ── BODY ── */
        .page-body {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        /* social icon row */
        .socials-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 8px 0 36px;
        }

        .social-icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .social-icon-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #0e0e0e;
            transform: scale(1.08);
        }

        .social-icon-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ── SECTION ── */
        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
            padding-left: 2px;
        }

        .section + .section {
            margin-top: 28px;
        }

        /* ── LINK CARD ── */
        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--text);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }

        .link-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 60%, rgba(212,169,106,0.06));
            pointer-events: none;
        }

        .link-card:hover {
            background: #222;
            border-color: rgba(212,169,106,0.35);
            transform: translateY(-2px);
        }

        .link-card:active {
            transform: translateY(0);
        }

        .card-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--accent);
        }

        /* playlist thumbnail override */
        .card-icon.thumb {
            background: #1c1c1e;
            overflow: hidden;
            padding: 0;
        }

        .card-icon.thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-text {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 0.92rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-sub {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .card-arrow {
            color: var(--muted);
            flex-shrink: 0;
        }

        .card-arrow svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(240,236,228,0.18);
            padding-top: 8px;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .hero        { animation: fadeUp 0.6s ease both; }
        .socials-row { animation: fadeUp 0.6s 0.15s ease both; }
        .section:nth-child(1) { animation: fadeUp 0.6s 0.25s ease both; }
        .section:nth-child(2) { animation: fadeUp 0.6s 0.35s ease both; }
        .section:nth-child(3) { animation: fadeUp 0.6s 0.45s ease both; }
    </style>
</head>
